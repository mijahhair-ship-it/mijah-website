<style>
  @keyframes promoIn { from { opacity:0; transform:scale(0.85); } to { opacity:1; transform:scale(1); } }
</style>
<script>
  function closePromo() {
    document.getElementById('promo-overlay').style.display = 'none';
    sessionStorage.setItem('promoSeen', '1');
  }
  function claimPromo() {
    const email = document.getElementById('promo-email').value;
    const lang = localStorage.getItem('mijahLang') || 'fr';
    if (!email || !email.includes('@')) {
      alert(lang === 'en' ? 'Please enter a valid email address.' : 'Veuillez entrer une adresse email valide.');
      return;
    }
    const thanks = lang === 'en' ? 'Thank you!' : 'Merci !';
    const msg = lang === 'en'
      ? `Your promo code <strong style="color:#c09040;">MIJAH10</strong> has been sent to <strong>${email}</strong>.`
      : `Votre code promo <strong style="color:#c09040;">MIJAH10</strong> a été envoyé à <strong>${email}</strong>.`;
    const cta = lang === 'en' ? 'Discover the Collection →' : 'Découvrir la Collection →';
    document.getElementById('promo-overlay').innerHTML = `<div style="background:#fff;border-radius:24px;max-width:420px;width:100%;padding:48px 28px;text-align:center;box-shadow:0 24px 80px rgba(0,0,0,0.2);">
      <div style="font-size:3rem;margin-bottom:16px;">🎉</div>
      <h3 style="font-family:'Cormorant Garamond',serif;font-size:1.8rem;color:#2b3d24;margin-bottom:10px;">${thanks}</h3>
      <p style="font-size:0.85rem;color:#777;line-height:1.7;margin-bottom:20px;">${msg}</p>
      <button onclick="closePromo()" style="padding:12px 32px;background:linear-gradient(135deg,#2b3d24,#4a6e3d);color:#fff;border:none;border-radius:100px;font-family:'Jost',sans-serif;font-size:0.85rem;cursor:pointer;">${cta}</button>
    </div>`;
  }
  // Show popup after 6 seconds if not already seen
  if (!sessionStorage.getItem('promoSeen')) {
    setTimeout(() => {
      const el = document.getElementById('promo-overlay');
      el.style.display = 'flex';
    }, 6000);
  }
</script>
